<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>反常积分实战特训</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };</script>
    <script id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        :root { --bg: #f8fafc; --card: #fff; --primary: #3b82f6; --text: #1e293b; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
        #app-container { flex-grow: 1; max-width: 800px; margin: 0 auto; width: 100%; padding: 20px; display: flex; flex-direction: column; }
        .card { background: var(--card); border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); padding: 30px; margin-bottom: 20px; border: 1px solid #e2e8f0; flex-grow: 1; display: flex; flex-direction: column; }
        .opt-btn { display: block; width: 100%; text-align: left; padding: 16px 20px; margin-bottom: 12px; border-radius: 12px; border: 2px solid #e2e8f0; background: #f8fafc; font-size: 1.05em; transition: all 0.2s; cursor: pointer; color: var(--text); }
        .opt-btn:hover:not(:disabled) { border-color: #cbd5e1; background: #f1f5f9; transform: translateX(4px); }
        .opt-btn.correct { background: #ecfdf5; border-color: #10b981; color: #065f46; font-weight: 500; }
        .opt-btn.wrong { background: #fef2f2; border-color: #ef4444; color: #991b1b; }
        .opt-btn:disabled { cursor: default; }
        #explanation { display: none; margin-top: 20px; padding: 20px; border-radius: 12px; background: #eff6ff; border-left: 4px solid var(--primary); animation: slideDown 0.3s ease-out forwards; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .progress-bg { height: 6px; background: #e2e8f0; border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: var(--primary); transition: width 0.3s; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding-top: 20px; border-top: 1px solid #e2e8f0; margin-top: auto; }
        .nav-btn { padding: 12px 24px; border-radius: 8px; font-weight: 600; transition: all 0.2s; cursor: pointer;}
        .btn-pri { background: var(--primary); color: white; border:none;}
        .btn-pri:hover:not(:disabled) { background: #2563eb; }
        .btn-pri:disabled { background: #94a3b8; cursor: not-allowed; opacity: 0.7; }
        .btn-sec { background: #f1f5f9; color: #475569; border:none;}
        .btn-sec:hover:not(:disabled) { background: #e2e8f0; }
        .btn-sec:disabled { opacity: 0; pointer-events: none; }
        #nav-modal { transition: opacity 0.3s; }
        #nav-content { transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal-hidden { opacity: 0; pointer-events: none; }
        .modal-hidden #nav-content { transform: scale(0.95) translateY(10px); }
    </style>
</head>
<body>

<div id="app-container">
    <div class="flex justify-between items-center mb-3">
        <h1 class="text-xl font-bold text-slate-800">反常积分特训</h1>
        <div class="flex items-center gap-2">
            <span id="progress-text" class="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1.5 rounded-full">1 / 40</span>
            <button onclick="toggleModal()" class="text-sm font-medium text-blue-600 bg-blue-50 px-3 py-1.5 rounded-full hover:bg-blue-100 transition border border-blue-100">选题面板</button>
        </div>
    </div>
    <div class="progress-bg"><div id="progress-fill" class="progress-fill" style="width: 0%;"></div></div>

    <div id="quiz-card" class="card relative">
        <div id="q-header" class="flex items-center gap-3 mb-4"></div>
        <div id="q-text" class="text-lg mb-6 leading-relaxed"></div>
        <div id="options-container"></div>
        <div id="explanation">
            <div class="font-bold text-blue-800 mb-2">💡 深度解析</div>
            <div id="exp-text" class="text-sm text-blue-900 leading-relaxed"></div>
        </div>
        <div class="nav-bar">
            <button id="btn-prev" class="nav-btn btn-sec" onclick="prevQ()">← 上一题</button>
            <button id="btn-next" class="nav-btn btn-pri" onclick="nextQ()" disabled>下一题 →</button>
        </div>
    </div>

    <div id="result-card" class="card hidden text-center py-10">
        <h2 class="text-3xl font-bold mb-4">特训完成！</h2>
        <div class="text-6xl font-black text-blue-600 mb-2" id="final-score">0</div>
        <p id="result-comment" class="text-lg font-medium text-slate-700 mb-6"></p>
        <div id="wrong-summary" class="text-left mb-6 text-sm text-slate-600 max-h-60 overflow-y-auto"></div>
        <div class="flex justify-center gap-4">
            <button class="nav-btn btn-sec" onclick="restart()">清空重练</button>
            <a href="index.html" class="nav-btn btn-pri" style="text-decoration:none;">返回主页</a>
        </div>
    </div>
</div>

<div id="nav-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center modal-hidden">
    <div id="nav-content" class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-2xl mx-4 max-h-[85vh] flex flex-column">
        <div class="flex justify-between border-b pb-3 mb-4">
            <h3 class="font-bold text-lg">题目导航</h3>
            <button onclick="toggleModal()" class="text-slate-400 hover:text-black">✖</button>
        </div>
        <div id="nav-grid" class="grid grid-cols-5 sm:grid-cols-8 gap-2 overflow-y-auto pb-2"></div>
    </div>
</div>

<script>
const questions = [
    // ═══ 第一组：p-积分基础 (Q1-Q5) ═══
    { q: "判断无穷积分 $\\int_{1}^{+\\infty} \\frac{1}{x^p}\\,dx$ 的敛散性：", opts: ["$p > 1$ 收敛，否则发散", "$p \\ge 1$ 收敛", "始终收敛", "始终发散"], ans: 0, exp: "无穷积分基础标尺。$p \\neq 1$ 时原函数为 $\\frac{x^{1-p}}{1-p}$，$A \\to +\\infty$ 时仅当 $1-p < 0$（即 $p > 1$）收敛。$p = 1$ 时为 $\\ln A \\to \\infty$，发散。", diff: "★ 基础" },
    { q: "判断瑕积分 $\\int_{0}^{1} \\frac{1}{x^p}\\,dx$（瑕点在 0）的敛散性：", opts: ["$p > 1$ 收敛", "$p < 1$ 收敛，否则发散", "始终收敛", "始终发散"], ans: 1, exp: "瑕积分标尺与无穷积分相反！原函数 $\\frac{x^{1-p}}{1-p}$，$\\varepsilon \\to 0^+$ 时仅当 $1-p > 0$（即 $p < 1$）收敛。口诀：「远严近宽」。", diff: "★ 基础" },
    { q: "判断 $\\int_{1}^{+\\infty} \\frac{3x^2 + 5}{x^5 + 2x^2 + 1}\\,dx$ 收敛性，最佳试探函数是：", opts: ["$1/x^5$", "$1/x^2$", "$1/x^3$", "$3/x^5$"], ans: 2, exp: "抓大头：分子最高次 $x^2$，分母 $x^5$，整体 $\\sim 3/x^3$。常数系数在判断阶数时可忽略，选 $1/x^3$（$p=3>1$，收敛）。", diff: "★ 基础" },
    { q: "判断 $\\int_{1}^{+\\infty} x^{2026} e^{-x}\\,dx$ 的敛散性：", opts: ["发散", "收敛", "无法判定", "条件收敛"], ans: 1, exp: "指数衰减压倒一切多项式增长。对任意 $\\alpha > 1$，当 $x$ 充分大时 $x^{2026} e^{-x} \\le 1/x^\\alpha$。本质上这就是 $\\Gamma(2027)$ 的被积函数在 $[1, +\\infty)$ 上的部分。", diff: "★ 基础" },
    { q: "判断 $\\int_1^{+\\infty} \\frac{1}{\\sqrt{x}(1+x)}\\,dx$ 的敛散性：", opts: ["收敛", "发散", "条件收敛", "无法判断"], ans: 0, exp: "$x \\to +\\infty$ 时 $\\sim 1/(x \\cdot x^{1/2}) = 1/x^{3/2}$，$p = 3/2 > 1$，收敛。注意在 $x=1$ 附近被积函数连续有界，无瑕点问题。", diff: "★ 基础" },

    // ═══ 第二组：瑕积分与泰勒展开 (Q6-Q10) ═══
    { q: "判断 $\\int_{0}^{1} \\frac{1-\\cos x}{x^{2.5}}\\,dx$（瑕点 0）的敛散性：", opts: ["收敛", "发散", "震荡", "无瑕点"], ans: 0, exp: "泰勒展开：$1-\\cos x \\sim x^2/2$。整体 $\\sim \\frac{x^2}{2x^{2.5}} = \\frac{1}{2x^{0.5}}$。瑕积分 $p=0.5<1$，收敛。", diff: "★★ 进阶" },
    { q: "判断 $\\int_0^1 \\frac{\\sin x - x}{x^3}\\,dx$（瑕点 0）的敛散性：", opts: ["发散", "收敛", "震荡", "需更多信息"], ans: 1, exp: "泰勒：$\\sin x - x \\sim -x^3/6$。整体 $\\sim -1/6$，在 0 附近趋于有限常数，可去奇点！积分当然收敛。", diff: "★★ 进阶" },
    { q: "判断 $\\int_0^1 \\frac{1}{x - \\sin x}\\,dx$（瑕点 0）的敛散性：", opts: ["收敛", "发散", "条件收敛", "极值存在"], ans: 1, exp: "分母泰勒：$x - \\sin x \\sim x^3/6$。被积函数 $\\sim 6/x^3$，瑕积分 $p=3 \\ge 1$，严重发散。", diff: "★★ 进阶" },
    { q: "判断 $\\int_0^1 \\frac{\\ln x}{\\sqrt{x}}\\,dx$ 的敛散性：", opts: ["发散", "收敛", "条件收敛", "需要分部积分才能判断"], ans: 1, exp: "虽然 $\\ln x \\to -\\infty$，但对任意 $\\varepsilon > 0$，$|\\ln x| \\le C_\\varepsilon / x^\\varepsilon$（$x \\to 0^+$）。取 $\\varepsilon = 0.25$：$|\\text{被积函数}| \\le C/x^{0.75}$，$p=0.75<1$，收敛。也可直接分部积分验证。", diff: "★★ 进阶" },
    { q: "判断 $\\int_0^1 \\frac{dx}{x^p |\\ln x|^q}$（$p=1, q=2$）的敛散性：", opts: ["收敛", "发散", "条件收敛", "需要 $q > 1$"], ans: 0, exp: "瑕点端 Bertrand 积分。$p=1, q=2 > 1$：收敛。换元 $u = -\\ln x$，化为 $\\int_0^{+\\infty} u^{-2}\\,du$ 在 $[1,+\\infty)$ 上收敛。", diff: "★★ 进阶" },

    // ═══ 第三组：Bertrand 积分 (Q11-Q14) ═══
    { q: "判断 $\\int_{e}^{+\\infty} \\frac{1}{x \\ln x}\\,dx$ 的敛散性：", opts: ["收敛", "发散", "条件收敛", "需知对数底数"], ans: 1, exp: "Bertrand 积分 $p=1, q=1$。换元 $u = \\ln x$：$\\int_1^{+\\infty} du/u$，这是 $p=1$ 的积分，发散。临界情况！", diff: "★★ 进阶" },
    { q: "判断 $\\int_{e}^{+\\infty} \\frac{1}{x (\\ln x)^2}\\,dx$ 的敛散性：", opts: ["收敛", "发散", "条件收敛", "震荡"], ans: 0, exp: "Bertrand 积分 $p=1, q=2 > 1$：收敛。换元 $u = \\ln x$ 后变为 $\\int_1^{+\\infty} u^{-2}\\,du = 1$。", diff: "★★ 进阶" },
    { q: "判断 $\\int_{2}^{+\\infty} \\frac{dx}{x^{0.99} (\\ln x)^{100}}\\,dx$ 的敛散性：", opts: ["收敛", "发散", "条件收敛", "绝对收敛"], ans: 1, exp: "Bertrand 标尺优先级：$p = 0.99 < 1$，无论 $q$ 多大都发散。多项式的发散力压倒一切对数修正。这是高频考点！", diff: "★★ 进阶" },
    { q: "判断 $\\int_e^{+\\infty} \\frac{dx}{x (\\ln x)(\\ln\\ln x)^2}$ 的敛散性：", opts: ["收敛", "发散", "无法判断", "震荡"], ans: 0, exp: "令 $u = \\ln x$，化为 $\\int_1^{+\\infty} \\frac{du}{u(\\ln u)^2}$，这又是 Bertrand 积分 $p=1, q=2 > 1$，收敛。可以不断嵌套！", diff: "★★★ 压轴" },

    // ═══ 第四组：比较判别法实战 (Q15-Q19) ═══
    { q: "判断 $\\int_1^{+\\infty} \\frac{\\sin^2(1/x)}{x}\\,dx$ 的敛散性：", opts: ["收敛", "发散", "条件收敛", "震荡"], ans: 0, exp: "$\\sin(1/x) \\sim 1/x$（$x \\to +\\infty$），所以 $\\sin^2(1/x) \\sim 1/x^2$。整体 $\\sim 1/x^3$，$p=3>1$，收敛。", diff: "★★ 进阶" },
    { q: "判断 $\\int_1^{+\\infty} \\frac{\\ln(1 + 1/x^2)}{\\sqrt{x}}\\,dx$ 的敛散性：", opts: ["收敛", "发散", "条件收敛", "需分部积分"], ans: 0, exp: "$\\ln(1+1/x^2) \\sim 1/x^2$（$x \\to +\\infty$）。整体 $\\sim 1/(x^2 \\cdot x^{1/2}) = 1/x^{5/2}$，$p=5/2>1$，收敛。", diff: "★★ 进阶" },
    { q: "判断 $\\int_0^{+\\infty} \\frac{x}{e^x - 1}\\,dx$ 的敛散性：", opts: ["收敛", "发散", "条件收敛", "需要 Gamma 函数"], ans: 0, exp: "两端分析。$x \\to 0^+$：$e^x - 1 \\sim x$，被积函数 $\\sim 1$，无瑕点。$x \\to +\\infty$：分母 $\\sim e^x$，被积函数 $\\sim x e^{-x} \\to 0$ 极快，收敛。事实上 $= \\Gamma(2)\\zeta(2) = \\pi^2/6$。", diff: "★★★ 压轴" },
    { q: "若 $\\lim_{x \\to +\\infty} \\frac{f(x)}{1/x} = 0$（$f > 0$），能否断定 $\\int_1^{+\\infty} f\\,dx$ 收敛？", opts: ["能", "不能", "必须 $f$ 单调", "必发散"], ans: 1, exp: "致命陷阱！$L=0$ 只说明 $f$ 比 $1/x$ 衰减快，但可能只快了一丁点。反例：$f(x) = 1/(x \\ln x)$，$\\lim xf(x) = \\lim 1/\\ln x = 0$，但积分发散（Bertrand $p=1,q=1$）。", diff: "💀 致命" },
    { q: "判断 $\\int_1^{+\\infty} \\left(\\sqrt{x+1} - \\sqrt{x}\\right)\\,dx$ 的敛散性：", opts: ["收敛", "发散", "条件收敛", "绝对收敛"], ans: 1, exp: "有理化：$\\sqrt{x+1}-\\sqrt{x} = \\frac{1}{\\sqrt{x+1}+\\sqrt{x}} \\sim \\frac{1}{2\\sqrt{x}}$。$p = 1/2 < 1$，发散。", diff: "★★ 进阶" },

    // ═══ 第五组：绝对收敛与放缩 (Q20-Q23) ═══
    { q: "判断 $\\int_{1}^{+\\infty} \\frac{\\cos x}{x^2}\\,dx$ 的敛散性：", opts: ["发散", "绝对收敛", "条件收敛", "无意义"], ans: 1, exp: "直接放缩：$|\\cos x / x^2| \\le 1/x^2$。$\\int 1/x^2$ 收敛，故原积分绝对收敛。最简单最高效的判法。", diff: "★ 基础" },
    { q: "判断 $\\int_1^{+\\infty} \\frac{\\cos(x^2)}{x^3}\\,dx$ 的敛散性：", opts: ["条件收敛", "绝对收敛", "发散", "震荡"], ans: 1, exp: "$|\\cos(x^2)/x^3| \\le 1/x^3$，$p=3>1$，绝对收敛。别想复杂了——能放缩就放缩。", diff: "★ 基础" },
    { q: "判断 $\\int_1^{+\\infty} (-1)^{[x]} \\frac{1}{x^2}\\,dx$ 的敛散性：", opts: ["绝对收敛", "条件收敛", "发散", "震荡"], ans: 0, exp: "加绝对值后为 $\\int 1/x^2$，收敛。绝对收敛！交错符号在衰减够快时无关紧要。", diff: "★ 基础" },
    { q: "判断 $\\int_1^{+\\infty} \\frac{\\sin x \\cos x}{x^{0.6}}\\,dx$ 的敛散性：", opts: ["绝对收敛", "条件收敛", "发散", "无法判断"], ans: 1, exp: "$\\sin x \\cos x = \\sin(2x)/2$。放缩：$|\\sin(2x)/(2x^{0.6})| \\le 1/(2x^{0.6})$，$p=0.6<1$，绝对值发散。但取 $f(x) = \\sin(2x)$、$g(x) = 1/(2x^{0.6})$，Dirichlet 条件满足，故条件收敛。", diff: "★★★ 压轴" },

    // ═══ 第六组：Dirichlet/Abel 应用 (Q24-Q30) ═══
    { q: "Dirichlet 判别法中，对 $f(x)$ 的关键要求是：", opts: ["极限为 0", "绝对值有界", "变上限积分有界", "必须非负"], ans: 2, exp: "Dirichlet 要求振荡项（如 $\\sin x$）的变上限积分（原函数）有界：$|\\int_a^A f| \\le M$。而衰减项 $g$ 需单调趋于 0。", diff: "★ 基础" },
    { q: "判断 $\\int_{1}^{+\\infty} \\frac{\\sin x}{x}\\,dx$ 的敛散性：", opts: ["绝对收敛", "条件收敛", "发散", "极限不存在"], ans: 1, exp: "经典 Dirichlet 模型。$\\sin x$ 原函数有界，$1/x$ 单调趋于 0：收敛。取绝对值后 $\\ge \\sin^2 x / x = (1-\\cos 2x)/(2x)$，其中 $1/(2x)$ 发散，故非绝对收敛。", diff: "★★ 进阶" },
    { q: "判断 $\\int_{2}^{+\\infty} \\frac{\\sin x}{\\ln x}\\,dx$ 的敛散性：", opts: ["发散", "绝对收敛", "条件收敛", "积分不存在"], ans: 2, exp: "$\\sin x$ 原函数有界；$1/\\ln x$ 单调递减趋于 0（虽然极慢）。Dirichlet 判定收敛。绝对值 $\\ge \\sin^2 x / \\ln x$，降幂后 $1/(2\\ln x)$ 发散，故仅条件收敛。", diff: "★★ 进阶" },
    { q: "判断 $\\int_1^{+\\infty} \\frac{\\sin x}{x^p}\\,dx$（$p > 0$）的结论：", opts: ["$p > 0$ 均绝对收敛", "$p > 1$ 绝对收敛，$0 < p \\le 1$ 条件收敛", "$p \\ge 1$ 收敛，$p < 1$ 发散", "$p > 0$ 均条件收敛"], ans: 1, exp: "$p > 1$：$|\\sin x / x^p| \\le 1/x^p$，绝对收敛。$0 < p \\le 1$：Dirichlet 给出收敛，但放缩后发散（类似 $\\sin x / x$ 的论证），故条件收敛。", diff: "★★★ 压轴" },
    { q: "已知 $\\int_1^{+\\infty} \\frac{\\sin x}{x}\\,dx$ 收敛，判断 $\\int_1^{+\\infty} \\frac{\\sin x}{x} e^{1/x}\\,dx$：", opts: ["发散", "收敛", "条件发散", "绝对收敛"], ans: 1, exp: "Abel 判别法。$e^{1/x}$ 在 $[1,+\\infty)$ 上单调递减（$1 \\le e^{1/x} \\le e$），有界。已知 $\\int \\sin x / x$ 收敛。由 Abel 收敛。", diff: "★★★ 压轴" },
    { q: "判断 $\\int_{1}^{+\\infty} \\sin(x^2)\\,dx$ 的敛散性：", opts: ["发散", "绝对收敛", "条件收敛", "震荡无积分"], ans: 2, exp: "菲涅尔积分。令 $t = x^2$：$\\int = \\frac{1}{2}\\int_1^{+\\infty} \\frac{\\sin t}{\\sqrt{t}}\\,dt$。Dirichlet：$\\sin t$ 原函数有界，$1/\\sqrt{t}$ 单调趋于 0。收敛但非绝对收敛。", diff: "★★★ 压轴" },
    { q: "判断 $\\int_1^{+\\infty} \\frac{\\cos(\\ln x)}{x}\\,dx$ 的敛散性：", opts: ["收敛", "发散", "条件收敛", "绝对收敛"], ans: 1, exp: "换元 $u = \\ln x$：$\\int_0^{+\\infty} \\cos u\\,du$。$\\cos u$ 的原函数 $\\sin u$ 不收敛（在 $-1$ 和 $1$ 之间震荡），积分发散。注意这里不能用 Dirichlet——因为没有衰减因子！", diff: "★★ 进阶" },

    // ═══ 第七组：致命陷阱 (Q31-Q35) ═══
    { q: "致命陷阱：$\\int_{1}^{+\\infty} \\frac{\\sin^2 x}{x}\\,dx$ 的敛散性：", opts: ["收敛", "发散", "条件收敛", "绝对收敛"], ans: 1, exp: "切勿用 Dirichlet！降幂：$\\sin^2 x / x = (1 - \\cos 2x)/(2x)$。$\\int \\cos(2x)/(2x)$ 收敛（Dirichlet），但 $\\int 1/(2x)$ 发散。收敛 + 发散 = 发散！", diff: "💀 致命" },
    { q: "防坑：$\\int_{0}^{+\\infty} \\frac{1}{x^2}\\,dx$ 的结果是：", opts: ["1", "$-1$", "0", "发散"], ans: 3, exp: "必须截断！无穷端 $p=2>1$ 收敛，但瑕点 $x=0$ 处 $p=2 \\ge 1$ 发散。一端发散则整体发散，不可抵消。", diff: "💀 致命" },
    { q: "$\\int f$ 和 $\\int g$ 均收敛，是否 $\\int fg$ 必收敛？", opts: ["必然收敛", "必然发散", "可能发散", "绝对收敛"], ans: 2, exp: "经典反例：$f = g = \\sin x / \\sqrt{x}$，两者均收敛（Dirichlet），但 $fg = \\sin^2 x / x$，由陷阱 Q31 发散！", diff: "💀 致命" },
    { q: "判断 $\\int_0^{\\pi/2} \\tan x\\,dx$ 的敛散性：", opts: ["收敛", "发散", "在 0 处发散", "无瑕点"], ans: 1, exp: "瑕点在 $\\pi/2$。令 $u = \\pi/2 - x$：$\\tan x = \\cot u = \\cos u / \\sin u \\sim 1/u$（$u \\to 0^+$）。$p = 1$，发散。", diff: "★★ 进阶" },
    { q: "判断 $\\int_0^1 x^x\\,dx$ 的敛散性：", opts: ["发散", "收敛", "无法判断", "需要数值方法"], ans: 1, exp: "$x^x = e^{x \\ln x}$。当 $x \\to 0^+$ 时 $x \\ln x \\to 0$，所以 $x^x \\to 1$。被积函数在 $[0,1]$ 上连续有界，当然收敛。甚至可以证明 $\\int_0^1 x^x\\,dx = \\sum_{n=1}^\\infty (-1)^{n+1} n^{-n}$。", diff: "★★★ 压轴" },

    // ═══ 第八组：高阶变换与综合 (Q36-Q40) ═══
    { q: "极易错：判断 $\\int_{1}^{+\\infty} x^{-\\ln x}\\,dx$ 的敛散性：", opts: ["发散", "收敛", "条件收敛", "无界"], ans: 1, exp: "变形：$x^{-\\ln x} = e^{-\\ln x \\cdot \\ln x} = e^{-(\\ln x)^2}$。当 $x \\ge e^2$ 时 $(\\ln x)^2 \\ge 2\\ln x$，即 $e^{-(\\ln x)^2} \\le e^{-2\\ln x} = 1/x^2$。由比较判别法收敛。", diff: "★★★ 压轴" },
    { q: "判断 $\\int_0^{+\\infty} \\frac{1}{x^{0.5} + x^2}\\,dx$ 的敛散性：", opts: ["收敛", "发散", "仅 0 端收敛", "仅 $\\infty$ 端收敛"], ans: 0, exp: "分两段。$x \\to 0$：$x^{0.5} + x^2 \\sim x^{0.5}$（小次幂主导），被积函数 $\\sim x^{-0.5}$，$p=0.5<1$，收敛。$x \\to \\infty$：$\\sim x^2$，被积函数 $\\sim 1/x^2$，$p=2>1$，收敛。两端均收敛。", diff: "★★★ 压轴" },
    { q: "判断 $\\int_{0}^{+\\infty} \\frac{\\cos x - e^{-x}}{x}\\,dx$ 的敛散性（注意 $x=0$）：", opts: ["发散", "绝对收敛", "条件收敛", "在 0 处发散"], ans: 2, exp: "$x=0$：$\\lim_{x\\to 0} \\frac{\\cos x - e^{-x}}{x} = \\frac{-\\sin 0 + e^0}{1} = 1$，可去奇点，非瑕点。$x \\to +\\infty$：拆为 $\\cos x / x$（条件收敛）和 $e^{-x}/x$（绝对收敛）。整体条件收敛。", diff: "★★★ 压轴" },
    { q: "Gamma 函数 $\\Gamma(s) = \\int_0^{+\\infty} x^{s-1} e^{-x}\\,dx$ 的收敛域是：", opts: ["$s > 0$", "$s \\ge 1$", "$s < 1$", "所有实数"], ans: 0, exp: "无穷端有 $e^{-x}$ 指数镇压，必收敛。$0$ 端被积函数 $\\sim x^{s-1}$，瑕积分需 $s-1 > -1$ 即 $s > 0$。与 $\\Gamma(n+1) = n!$ 联系。", diff: "★★ 进阶" },
    { q: "判断 $\\int_{2}^{+\\infty} \\frac{(-1)^{[x]}}{\\ln x}\\,dx$（$[x]$ 为取整）的敛散性：", opts: ["绝对收敛", "条件收敛", "发散", "无法计算"], ans: 1, exp: "$(-1)^{[x]}$ 是交错阶梯函数，在每个 $[n, n+1)$ 上取值 $(-1)^n$。其变上限积分有界（在 0 和 1 之间跳跃）。$1/\\ln x$ 单调趋于 0。满足 Dirichlet，条件收敛。绝对值 $\\ge \\sin^2(\\pi x/2)/\\ln x$ 型，发散。", diff: "★★★ 压轴" }
];

let curr = 0, score = 0, userAns = new Array(questions.length).fill(null);
const STORE_KEY = 'math_integral_v6';

const diffStyles = {
    '★ 基础': 'bg-emerald-100 text-emerald-700 border-emerald-200',
    '★★ 进阶': 'bg-blue-100 text-blue-700 border-blue-200',
    '★★★ 压轴': 'bg-purple-100 text-purple-700 border-purple-200',
    '💀 致命': 'bg-red-100 text-red-700 border-red-200'
};

function rMath(els) { if(window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise(els).catch(()=>{}); }

function init() {
    const saved = localStorage.getItem(STORE_KEY);
    if (saved) { try { const p = JSON.parse(saved); if(p.userAns && p.userAns.length===questions.length) { userAns=p.userAns; score=p.score; curr=p.curr; } } catch(e){} }
    renderQ();
}

function save() { localStorage.setItem(STORE_KEY, JSON.stringify({ curr, score, userAns })); }

function renderQ() {
    const q = questions[curr];
    document.getElementById('progress-text').innerText = `${curr+1} / ${questions.length}`;
    document.getElementById('progress-fill').style.width = `${((curr+1)/questions.length)*100}%`;

    const bc = diffStyles[q.diff] || 'bg-slate-100 text-slate-700';
    document.getElementById('q-header').innerHTML = `<strong class="text-xl">Q${curr+1}</strong> <span class="text-xs font-bold px-2 py-1 rounded border ${bc}">${q.diff}</span>`;
    document.getElementById('q-text').innerHTML = q.q;

    const od = document.getElementById('options-container'); od.innerHTML = '';
    q.opts.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn'; btn.innerHTML = opt;
        btn.onclick = () => handleAns(idx);
        od.appendChild(btn);
    });

    document.getElementById('explanation').style.display = 'none';
    document.getElementById('btn-prev').disabled = (curr === 0);

    if (userAns[curr] !== null) restoreAns();
    else document.getElementById('btn-next').disabled = true;

    rMath([document.getElementById('quiz-card')]);
    save();
}

function handleAns(idx) {
    if (userAns[curr] !== null) return;
    const isC = (idx === questions[curr].ans);
    userAns[curr] = { sel: idx, isC };
    if (isC) score++;
    save(); restoreAns();
}

function restoreAns() {
    const q = questions[curr], ans = userAns[curr];
    const btns = document.getElementById('options-container').querySelectorAll('.opt-btn');
    btns.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.ans) btn.classList.add('correct');
        else if (i === ans.sel && !ans.isC) btn.classList.add('wrong');
    });
    document.getElementById('exp-text').innerHTML = q.exp;
    document.getElementById('explanation').style.display = 'block';
    const nb = document.getElementById('btn-next');
    nb.disabled = false;
    nb.innerText = (curr === questions.length - 1) ? "查看报告 →" : "下一题 →";
    rMath([document.getElementById('explanation')]);
}

function nextQ() { if (curr === questions.length - 1) showRes(); else { curr++; renderQ(); } }
function prevQ() { if (curr > 0) { curr--; renderQ(); } }

let modalOpen = false;
function toggleModal() {
    modalOpen = !modalOpen;
    const m = document.getElementById('nav-modal');
    if (modalOpen) { renderGrid(); m.classList.remove('modal-hidden'); }
    else m.classList.add('modal-hidden');
}

function renderGrid() {
    const grid = document.getElementById('nav-grid'); grid.innerHTML = '';
    for (let i = 0; i < questions.length; i++) {
        const btn = document.createElement('button'); btn.innerText = i + 1;
        btn.className = 'w-10 h-10 rounded-lg font-bold text-sm border-2 ';
        if (userAns[i] !== null) btn.className += userAns[i].isC ? 'bg-emerald-100 border-emerald-400 text-emerald-700 ' : 'bg-red-100 border-red-400 text-red-700 ';
        else btn.className += 'bg-slate-50 border-slate-200 text-slate-500 ';
        if (i === curr) btn.className += 'ring-2 ring-blue-500 bg-white ';
        btn.onclick = () => { curr = i; toggleModal(); renderQ(); };
        grid.appendChild(btn);
    }
}

function showRes() {
    document.getElementById('quiz-card').classList.add('hidden');
    const rc = document.getElementById('result-card'); rc.classList.remove('hidden');
    document.getElementById('final-score').innerText = `${score} / ${questions.length}`;

    const pct = score / questions.length;
    document.getElementById('result-comment').innerText =
        pct >= 0.9 ? "基础极其扎实！可以挑战 Agrégation 级别了。" :
        pct >= 0.7 ? "核心判别法已掌握，注意复盘致命陷阱。" :
        pct >= 0.5 ? "中等水平，建议重读知识页的证明部分。" :
        "需要系统复习标尺和判别法，从基础题重新开始。";

    // Wrong question summary
    let wrongHtml = '';
    const wrongs = userAns.map((a, i) => a && !a.isC ? i : -1).filter(i => i >= 0);
    if (wrongs.length > 0) {
        wrongHtml = '<div class="border-t pt-4 mt-4"><p class="font-bold text-slate-800 mb-3">❌ 错题回顾：</p>';
        wrongs.forEach(i => {
            wrongHtml += `<p class="mb-2"><strong>Q${i+1}</strong>（${questions[i].diff}）：${questions[i].q.replace(/\$/g, '').substring(0, 60)}...</p>`;
        });
        wrongHtml += '</div>';
    }
    document.getElementById('wrong-summary').innerHTML = wrongHtml;
    rMath([rc]);
}

function restart() { if(confirm("确定清空记录吗？")) { localStorage.removeItem(STORE_KEY); location.reload(); } }

window.onload = init;
</script>
</body>
</html>
